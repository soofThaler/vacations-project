services:
  mysql:
    image: mysql:8.0
    container_name: vacations-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vacations-net

  backend:
    build: ./Backend
    container_name: vacations-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      PORT: 4000
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: vacation_management
      HASH_SALT: ${HASH_SALT}
      JWT_SECRET: ${JWT_SECRET}
      OPEN_AI_KEY: ${OPEN_AI_KEY}
    ports:
      - "4000:4000"
    volumes:
      - backend_images:/app/src/1-assets/images
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vacations-net

  frontend:
    build: ./Frontend
    container_name: vacations-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vacations-net

volumes:
  mysql_data:
  backend_images:

networks:
  vacations-net:
    driver: bridge
